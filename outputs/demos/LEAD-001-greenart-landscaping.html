<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenArt Landscaping | Kansas City, KS — Landscaping</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --olive:#3B5323;--olive-light:#4D6E30;--olive-dark:#2A3D18;--olive-muted:#6B8F55;
  --sand:#C4A77D;--sand-light:#D4BFA0;--sand-dark:#A88B5E;
  --copper:#B8632E;--copper-light:#D07840;--copper-dark:#8E4A1E;
  --stone:#8B8274;--stone-light:#A69D8E;
  --cream:#FAF6F0;--cream2:#F0EAE0;--cream3:#E2D9CC;
  --white:#FFFFFF;--bg:#FDFBF8;
  --text:#2A2318;--text-mid:#5A5244;--text-dim:#8A826E;
  --font-h:'Cormorant Garant',serif;--font-b:'Manrope',sans-serif;
  --ease:cubic-bezier(.25,.46,.45,.94);--ease-out:cubic-bezier(.16,1,.3,1);
  --max:1200px;--radius:6px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);line-height:1.7;overflow-x:hidden}
a{color:var(--olive);text-decoration:none;transition:color .3s}
img{max-width:100%;display:block}
.rv{opacity:0;transform:translateY(30px);transition:all .7s var(--ease-out)}
.rv.vis{opacity:1;transform:none}

/* === NAV === */
.sg-nav{position:sticky;top:0;z-index:999;background:rgba(253,251,248,.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,.04)}
.sg-nav-inner{max-width:var(--max);margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:18px 40px}
.sg-logo{font-family:var(--font-h);font-size:1.5rem;font-weight:700;color:var(--olive-dark);letter-spacing:-.5px}
.sg-logo span{color:var(--copper);font-weight:400;font-style:italic}
.sg-nav-links{display:flex;gap:32px;align-items:center}
.sg-nav-links a{font-size:.72rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-mid);transition:color .2s}
.sg-nav-links a:hover{color:var(--olive)}
.sg-nav-right{display:flex;align-items:center;gap:16px}
.sg-nav-phone{font-size:.78rem;font-weight:600;color:var(--text)}
.sg-nav-cta{background:var(--olive);color:#fff;padding:11px 28px;font-family:var(--font-b);font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:none;border-radius:4px;cursor:pointer;transition:all .3s}
.sg-nav-cta:hover{background:var(--olive-dark);transform:translateY(-1px);box-shadow:0 4px 16px rgba(59,83,35,.25)}
.sg-ham{display:none;flex-direction:column;gap:5px;cursor:pointer;z-index:1002}
.sg-ham span{width:24px;height:2px;background:var(--text);transition:all .3s}

/* === HERO — Full-bleed cinematic === */
.sg-hero{position:relative;min-height:92vh;display:flex;align-items:center;overflow:hidden}
.sg-hero-bg{position:absolute;inset:0}
.sg-hero-bg img{width:100%;height:100%;object-fit:cover}
.sg-hero-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(42,61,24,.82),rgba(42,35,24,.65))}
.sg-hero-content{position:relative;z-index:2;max-width:var(--max);margin:0 auto;width:100%;padding:0 40px;text-align:center}
.sg-hero-tag{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-b);font-size:.65rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--sand-light);margin-bottom:24px}
.sg-hero-tag::before,.sg-hero-tag::after{content:'';width:40px;height:1px;background:var(--sand)}
.sg-hero-content h1{font-family:var(--font-h);font-size:clamp(2.8rem,6vw,5rem);font-weight:600;color:#fff;line-height:1.05;margin-bottom:20px;letter-spacing:-1px}
.sg-hero-content h1 em{font-style:italic;color:var(--sand-light)}
.sg-hero-sub{font-size:1.05rem;color:rgba(255,255,255,.6);max-width:540px;margin:0 auto 36px;line-height:1.8;font-weight:300}
.sg-hero-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.sg-btn-w{background:var(--white);color:var(--olive-dark);padding:15px 36px;font-family:var(--font-b);font-size:.75rem;font-weight:700;letter-spacing:.5px;border:none;border-radius:4px;cursor:pointer;transition:all .3s}
.sg-btn-w:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.2)}
.sg-btn-o{background:transparent;color:#fff;padding:15px 36px;font-family:var(--font-b);font-size:.75rem;font-weight:600;letter-spacing:.5px;border:1px solid rgba(255,255,255,.3);border-radius:4px;cursor:pointer;transition:all .3s}
.sg-btn-o:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.5)}
.sg-hero-scroll{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.4);font-size:.65rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:8px}
.sg-hero-scroll::after{content:'';width:1px;height:40px;background:rgba(255,255,255,.2);animation:scrollPulse 2s ease infinite}
@keyframes scrollPulse{0%,100%{opacity:.2;height:40px}50%{opacity:.6;height:50px}}

/* === TRUST BAR === */
.sg-trust{background:var(--olive-dark);padding:20px 40px}
.sg-trust-inner{max-width:var(--max);margin:0 auto;display:flex;justify-content:center;gap:48px;flex-wrap:wrap}
.sg-trust-item{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.7);font-size:.75rem;font-weight:500}
.sg-trust-item strong{color:var(--sand-light);font-size:.95rem;font-weight:700}

/* === SECTION STYLES === */
.sg-tag{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-b);font-size:.6rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--copper);margin-bottom:14px}
.sg-tag::before{content:'';width:24px;height:2px;background:var(--copper)}
.sg-title{font-family:var(--font-h);font-size:clamp(2rem,4vw,3rem);font-weight:600;color:var(--olive-dark);margin-bottom:14px;line-height:1.1;letter-spacing:-.5px}
.sg-sub{font-size:.9rem;color:var(--text-mid);max-width:540px;line-height:1.8;font-weight:400}

/* === SERVICES — Masonry-style cards === */
.sg-services{padding:100px 40px;max-width:var(--max);margin:0 auto}
.sg-services-header{text-align:center;margin-bottom:64px}
.sg-services-header .sg-sub{margin:0 auto}
.sg-svc-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto auto;gap:20px}
.sg-svc{position:relative;border-radius:var(--radius);overflow:hidden;cursor:pointer;min-height:280px;display:flex;align-items:flex-end}
.sg-svc.tall{grid-row:span 2;min-height:580px}
.sg-svc img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .6s var(--ease)}
.sg-svc:hover img{transform:scale(1.05)}
.sg-svc-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(42,35,24,.85) 0%,transparent 60%);transition:background .4s}
.sg-svc:hover .sg-svc-overlay{background:linear-gradient(0deg,rgba(59,83,35,.9) 0%,rgba(59,83,35,.2) 70%)}
.sg-svc-info{position:relative;z-index:2;padding:28px;width:100%}
.sg-svc-info h3{font-family:var(--font-h);font-size:1.4rem;color:#fff;margin-bottom:4px}
.sg-svc-info p{font-size:.75rem;color:rgba(255,255,255,.6);line-height:1.6;max-height:0;overflow:hidden;transition:max-height .4s var(--ease)}
.sg-svc:hover .sg-svc-info p{max-height:80px}

/* === BEFORE/AFTER SLIDER === */
.sg-ba{background:var(--cream);padding:100px 40px}
.sg-ba-inner{max-width:var(--max);margin:0 auto}
.sg-ba-header{text-align:center;margin-bottom:56px}
.sg-ba-header .sg-sub{margin:0 auto}
.sg-slider-wrap{position:relative;max-width:900px;margin:0 auto;border-radius:var(--radius);overflow:hidden;cursor:col-resize;user-select:none;aspect-ratio:16/9}
.sg-slider-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.sg-slider-after{clip-path:inset(0 0 0 50%)}
.sg-slider-line{position:absolute;top:0;bottom:0;left:50%;width:3px;background:var(--white);z-index:5;pointer-events:none}
.sg-slider-handle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;background:var(--white);border-radius:50%;z-index:6;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.2);pointer-events:none;font-size:.8rem;color:var(--text-mid);font-weight:700}
.sg-slider-labels{display:flex;justify-content:space-between;padding:16px 0;max-width:900px;margin:0 auto}
.sg-slider-labels span{font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)}

/* === PORTFOLIO GALLERY === */
.sg-portfolio{padding:100px 40px;max-width:var(--max);margin:0 auto}
.sg-portfolio-header{text-align:center;margin-bottom:20px}
.sg-portfolio-header .sg-sub{margin:0 auto}
.sg-filters{display:flex;justify-content:center;gap:8px;margin:28px 0 48px;flex-wrap:wrap}
.sg-filter{padding:9px 22px;font-family:var(--font-b);font-size:.7rem;font-weight:600;letter-spacing:.5px;border:1px solid var(--cream3);border-radius:30px;background:var(--white);color:var(--text-mid);cursor:pointer;transition:all .3s}
.sg-filter.active,.sg-filter:hover{background:var(--olive);color:#fff;border-color:var(--olive)}
.sg-port-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.sg-port-item{position:relative;border-radius:var(--radius);overflow:hidden;aspect-ratio:4/3;cursor:pointer}
.sg-port-item img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease)}
.sg-port-item:hover img{transform:scale(1.06)}
.sg-port-item-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(42,35,24,.7) 0%,transparent 50%);opacity:0;transition:opacity .4s}
.sg-port-item:hover .sg-port-item-overlay{opacity:1}
.sg-port-item-info{position:absolute;bottom:16px;left:16px;z-index:2;opacity:0;transform:translateY(8px);transition:all .4s}
.sg-port-item:hover .sg-port-item-info{opacity:1;transform:none}
.sg-port-item-info h4{font-family:var(--font-h);font-size:1.1rem;color:#fff}
.sg-port-item-info span{font-size:.68rem;color:var(--sand-light);font-weight:500}

/* === PROCESS === */
.sg-process{background:var(--olive-dark);padding:100px 40px;position:relative;overflow:hidden}
.sg-process::before{content:'';position:absolute;top:-200px;right:-200px;width:500px;height:500px;border-radius:50%;background:rgba(196,167,125,.05)}
.sg-process-inner{max-width:var(--max);margin:0 auto;position:relative;z-index:1}
.sg-process-header{text-align:center;margin-bottom:64px}
.sg-process-header .sg-tag{color:var(--sand)}
.sg-process-header .sg-tag::before{background:var(--sand)}
.sg-process-header .sg-title{color:var(--cream)}
.sg-process-header .sg-sub{color:rgba(255,255,255,.5);margin:0 auto}
.sg-steps{display:grid;grid-template-columns:repeat(5,1fr);gap:24px}
.sg-step{text-align:center;position:relative}
.sg-step::after{content:'';position:absolute;top:36px;right:-12px;width:24px;height:1px;background:rgba(255,255,255,.15)}
.sg-step:last-child::after{display:none}
.sg-step-icon{width:72px;height:72px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:1.6rem;transition:all .4s}
.sg-step:hover .sg-step-icon{background:rgba(196,167,125,.15);border-color:var(--sand)}
.sg-step h4{font-family:var(--font-h);font-size:1.1rem;color:var(--cream);margin-bottom:6px}
.sg-step p{font-size:.72rem;color:rgba(255,255,255,.45);line-height:1.7;padding:0 6px}

/* === SEASONAL TIMELINE === */
.sg-seasons{padding:100px 40px;max-width:var(--max);margin:0 auto}
.sg-seasons-header{text-align:center;margin-bottom:56px}
.sg-seasons-header .sg-sub{margin:0 auto}
.sg-season-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.sg-season{background:var(--white);border:1px solid rgba(0,0,0,.04);border-radius:var(--radius);overflow:hidden;transition:all .4s}
.sg-season:hover{box-shadow:0 12px 40px rgba(0,0,0,.08);transform:translateY(-4px)}
.sg-season-top{padding:24px 24px 0;text-align:center}
.sg-season-icon{font-size:2.4rem;margin-bottom:8px;display:block}
.sg-season-name{font-family:var(--font-h);font-size:1.3rem;color:var(--olive-dark);display:block;margin-bottom:4px}
.sg-season-months{font-size:.65rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim)}
.sg-season-list{padding:20px 24px 28px;list-style:none}
.sg-season-list li{font-size:.78rem;color:var(--text-mid);padding:6px 0;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(0,0,0,.03)}
.sg-season-list li:last-child{border:none}
.sg-season-list li::before{content:'●';font-size:.4rem;color:var(--olive-muted);flex-shrink:0}

/* === ESTIMATE FORM === */
.sg-estimate{background:var(--cream);padding:100px 40px}
.sg-est-inner{max-width:860px;margin:0 auto}
.sg-est-header{text-align:center;margin-bottom:48px}
.sg-est-header .sg-sub{margin:0 auto}
.sg-est-card{background:var(--white);border-radius:10px;padding:48px;box-shadow:0 8px 40px rgba(0,0,0,.06)}
.sg-est-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.sg-est-field label{display:block;font-size:.65rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px}
.sg-est-field input,.sg-est-field select,.sg-est-field textarea{width:100%;padding:13px 16px;font-family:var(--font-b);font-size:.85rem;border:1px solid var(--cream3);border-radius:var(--radius);background:var(--cream);color:var(--text);transition:border-color .3s;outline:none}
.sg-est-field input:focus,.sg-est-field select:focus,.sg-est-field textarea:focus{border-color:var(--olive)}
.sg-est-field textarea{height:90px;resize:vertical}
.sg-est-full{grid-column:span 2}
.sg-est-submit{width:100%;padding:16px;margin-top:8px;background:var(--olive);color:#fff;font-family:var(--font-b);font-size:.8rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:none;border-radius:var(--radius);cursor:pointer;transition:all .3s}
.sg-est-submit:hover{background:var(--olive-dark);transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,83,35,.25)}
.sg-est-note{text-align:center;margin-top:14px;font-size:.72rem;color:var(--text-dim)}

/* === ABOUT === */
.sg-about{padding:100px 40px;max-width:var(--max);margin:0 auto}
.sg-about-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
.sg-about-img{position:relative;border-radius:var(--radius);overflow:hidden}
.sg-about-img img{width:100%;height:440px;object-fit:cover}
.sg-about-accent{position:absolute;bottom:-12px;right:-12px;width:180px;height:180px;border:2px solid var(--sand);border-radius:var(--radius);z-index:-1}
.sg-about-stats{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:32px}
.sg-stat{background:var(--cream);border-radius:var(--radius);padding:20px;text-align:center}
.sg-stat strong{display:block;font-family:var(--font-h);font-size:1.8rem;color:var(--olive);margin-bottom:2px}
.sg-stat span{font-size:.68rem;color:var(--text-dim);font-weight:600;letter-spacing:.5px;text-transform:uppercase}

/* === REVIEWS === */
.sg-reviews{background:var(--olive-dark);padding:100px 40px}
.sg-reviews-inner{max-width:var(--max);margin:0 auto}
.sg-reviews-header{text-align:center;margin-bottom:56px}
.sg-reviews-header .sg-tag{color:var(--sand)}
.sg-reviews-header .sg-tag::before{background:var(--sand)}
.sg-reviews-header .sg-title{color:var(--cream)}
.sg-reviews-header .sg-sub{color:rgba(255,255,255,.5);margin:0 auto}
.sg-rev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.sg-rev{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:32px;transition:all .4s}
.sg-rev:hover{background:rgba(255,255,255,.1);transform:translateY(-3px)}
.sg-rev-stars{color:var(--sand);font-size:.8rem;letter-spacing:2px;margin-bottom:14px}
.sg-rev p{font-size:.82rem;color:rgba(255,255,255,.6);line-height:1.8;margin-bottom:18px;font-style:italic}
.sg-rev-author{display:flex;align-items:center;gap:10px}
.sg-rev-avatar{width:36px;height:36px;border-radius:50%;background:var(--olive-light);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff}
.sg-rev-info strong{display:block;font-size:.78rem;color:var(--cream)}
.sg-rev-info span{font-size:.65rem;color:rgba(255,255,255,.35)}

/* === CTA === */
.sg-cta{position:relative;padding:100px 40px;text-align:center;overflow:hidden}
.sg-cta-bg{position:absolute;inset:0}
.sg-cta-bg img{width:100%;height:100%;object-fit:cover}
.sg-cta-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(42,61,24,.88),rgba(42,35,24,.75))}
.sg-cta-content{position:relative;z-index:2}
.sg-cta h2{font-family:var(--font-h);font-size:clamp(2rem,4vw,3.2rem);color:var(--cream);margin-bottom:14px;font-weight:600}
.sg-cta p{font-size:.95rem;color:rgba(255,255,255,.55);max-width:480px;margin:0 auto 36px;font-weight:300}
.sg-cta .sg-btn-w{box-shadow:0 4px 16px rgba(0,0,0,.15)}

/* === FOOTER === */
.sg-footer{background:#1A1D14;padding:64px 40px 28px}
.sg-footer-inner{max-width:var(--max);margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px}
.sg-footer-brand{font-family:var(--font-h);font-size:1.3rem;color:var(--cream);margin-bottom:12px}
.sg-footer-brand span{color:var(--sand);font-weight:400;font-style:italic}
.sg-footer-desc{font-size:.75rem;color:rgba(255,255,255,.35);line-height:1.7;max-width:280px}
.sg-footer h5{font-size:.6rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:18px}
.sg-footer ul{list-style:none}
.sg-footer li{margin-bottom:8px}
.sg-footer li a{font-size:.78rem;color:rgba(255,255,255,.45);transition:color .2s}
.sg-footer li a:hover{color:var(--sand-light)}
.sg-footer-bar{max-width:var(--max);margin:40px auto 0;padding-top:20px;border-top:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;font-size:.68rem;color:rgba(255,255,255,.2)}

/* === MOBILE === */
@media(max-width:1024px){
  .sg-svc-grid{grid-template-columns:1fr 1fr}
  .sg-svc.tall{grid-row:auto;min-height:280px}
  .sg-steps{grid-template-columns:repeat(3,1fr)}
  .sg-season-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:768px){
  .sg-nav-links,.sg-nav-phone{display:none}
  .sg-ham{display:flex}
  .sg-nav-inner{padding:14px 20px}
  .sg-hero{min-height:80vh}
  .sg-hero-content{padding:0 20px}
  .sg-hero-content h1{font-size:clamp(2.2rem,8vw,3.4rem)}
  .sg-trust-inner{gap:20px;justify-content:center}
  .sg-svc-grid{grid-template-columns:1fr}
  .sg-svc{min-height:220px}
  .sg-svc.tall{min-height:220px}
  .sg-port-grid{grid-template-columns:1fr 1fr}
  .sg-steps{grid-template-columns:1fr 1fr}
  .sg-step::after{display:none}
  .sg-season-grid{grid-template-columns:1fr}
  .sg-est-row{grid-template-columns:1fr}
  .sg-est-full{grid-column:auto}
  .sg-est-card{padding:28px 20px}
  .sg-about-grid{grid-template-columns:1fr;gap:32px}
  .sg-rev-grid{grid-template-columns:1fr}
  .sg-footer-inner{grid-template-columns:1fr 1fr;gap:28px}
  .sg-services,.sg-ba,.sg-portfolio,.sg-seasons,.sg-estimate,.sg-about{padding:64px 20px}
  .sg-process,.sg-reviews{padding:64px 20px}
  .sg-cta{padding:64px 20px}
  .sg-slider-wrap{aspect-ratio:4/3}
}
@media(max-width:480px){
  .sg-port-grid{grid-template-columns:1fr}
  .sg-steps{grid-template-columns:1fr}
  .sg-about-stats{grid-template-columns:1fr}
  .sg-footer-inner{grid-template-columns:1fr}
  .sg-filters{gap:6px}
  .sg-filter{padding:7px 14px;font-size:.65rem}
}

/* grain */
