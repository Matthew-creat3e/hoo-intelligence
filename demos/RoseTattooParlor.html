<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rose Tattoo Parlor | Kansas City, MO — Tattoo</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Syne:wght@400;600;700;800&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080808;--bg2:#0E0E0E;--bg3:#151515;
  --accent:#C41230;--accent2:#FF1744;--accent-glow:rgba(196,18,48,.2);--accent-soft:rgba(196,18,48,.08);
  --text:#F2F2F2;--text-dim:rgba(242,242,242,.25);--text-mid:rgba(242,242,242,.5);
  --font-h:'Anton',sans-serif;--font-b:'Syne',sans-serif;--font-s:'Cormorant Garamond',serif;
  --ease:cubic-bezier(.25,.46,.45,.94);--ease-out:cubic-bezier(.16,1,.3,1);--ease-smooth:cubic-bezier(.22,1,.36,1);
  --max:1200px;--radius:14px;--border:rgba(242,242,242,.06);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);line-height:1.7;overflow-x:hidden;cursor:default}

/* noise texture */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9990;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* cursor */
.tt-cursor{position:fixed;width:18px;height:18px;border:1.5px solid var(--accent);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .35s var(--ease-out),height .35s var(--ease-out),background .35s var(--ease);mix-blend-mode:difference}
.tt-cursor.hover{width:60px;height:60px;background:rgba(255,23,68,.06)}
.tt-cursor-dot{position:fixed;width:4px;height:4px;background:var(--accent2);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%)}

/* loader */
.tt-loader{position:fixed;inset:0;background:var(--bg);z-index:100000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .8s var(--ease),visibility .8s}
.tt-loader.done{opacity:0;visibility:hidden;pointer-events:none}
.tt-loader-text{font-family:var(--font-h);font-size:clamp(2rem,5vw,3rem);letter-spacing:12px;color:var(--accent);text-transform:uppercase}
.tt-loader-text span{display:inline-block;transform:translateY(100%);animation:tt-lin .35s var(--ease-out) forwards}
.tt-loader-text span:nth-child(1){animation-delay:.05s}.tt-loader-text span:nth-child(2){animation-delay:.1s}.tt-loader-text span:nth-child(3){animation-delay:.15s}.tt-loader-text span:nth-child(4){animation-delay:.2s}.tt-loader-text span:nth-child(5){animation-delay:.25s}.tt-loader-text span:nth-child(6){animation-delay:.3s}.tt-loader-text span:nth-child(7){animation-delay:.35s}.tt-loader-text span:nth-child(8){animation-delay:.4s}.tt-loader-text span:nth-child(9){animation-delay:.45s}.tt-loader-text span:nth-child(10){animation-delay:.5s}.tt-loader-text span:nth-child(11){animation-delay:.55s}
.tt-loader-line{width:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:tt-lline 1s var(--ease) .5s forwards}
@keyframes tt-lin{to{transform:translateY(0)}}
@keyframes tt-lline{to{width:200px}}

/* progress bar */
.tt-progress{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;z-index:10001}

a{color:var(--accent);text-decoration:none;transition:color .3s}
a:hover{color:var(--accent2)}
img{max-width:100%;display:block}

/* anims */
.tt-pop{opacity:0;transform:translateY(40px);transition:all .9s var(--ease-smooth)}
.tt-vis{opacity:1!important;transform:none!important}
.tt-pop-l{opacity:0;transform:translateX(-60px);transition:all 1s var(--ease-smooth)}
.tt-pop-r{opacity:0;transform:translateX(60px);transition:all 1s var(--ease-smooth)}
@keyframes tt-up{to{opacity:1;transform:translateY(0)}}
@keyframes tt-glow{from{transform:scale(1)}to{transform:scale(1.15)}}
@keyframes tt-rev{to{transform:translateY(0)}}

/* === NAV === */
.tt-nav{position:fixed;top:0;left:0;width:100%;z-index:999;padding:20px 0;background:transparent;transition:all .5s var(--ease-smooth)}
.tt-nav.scrolled{background:rgba(8,8,8,.95);backdrop-filter:blur(24px);padding:14px 0;border-bottom:1px solid rgba(196,18,48,.1)}
.tt-nav-inner{max-width:var(--max);margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 40px}
.tt-logo{font-family:var(--font-h);font-size:1.5rem;letter-spacing:8px;color:var(--text);text-transform:uppercase;position:relative}
.tt-logo::after{content:'';position:absolute;bottom:-4px;left:0;width:100%;height:2px;background:var(--accent)}
.tt-nav-links{display:flex;gap:32px;align-items:center}
.tt-nav-links a{font-size:.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:3px;font-weight:700;position:relative}
.tt-nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:var(--accent);transition:width .4s var(--ease-out)}
.tt-nav-links a:hover{color:var(--text)}
.tt-nav-links a:hover::after{width:100%}
.tt-nav-cta{background:transparent;color:var(--accent);padding:10px 28px;font-family:var(--font-h);font-size:.75rem;letter-spacing:5px;border:2px solid var(--accent);cursor:pointer;transition:all .4s var(--ease)}
.tt-nav-cta:hover{background:var(--accent);color:#fff;box-shadow:0 0 30px var(--accent-glow)}
.tt-ham{display:none;flex-direction:column;gap:6px;cursor:pointer;z-index:1002}
.tt-ham span{width:24px;height:2px;background:var(--text);transition:all .3s}

/* === HERO — CINEMATIC SPLIT === */
.tt-hero{min-height:100vh;display:grid;grid-template-columns:1.1fr 1fr;position:relative;overflow:hidden}
.tt-hero-left{display:flex;flex-direction:column;justify-content:center;padding:140px 0 80px clamp(40px,6vw,100px);position:relative;z-index:2}
.tt-hero-tag{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-b);font-size:.6rem;letter-spacing:4px;text-transform:uppercase;color:var(--accent);margin-bottom:28px;opacity:0;animation:tt-up .8s var(--ease-smooth) .5s forwards}
.tt-hero-tag::before{content:'';width:48px;height:2px;background:var(--accent)}
.tt-hero h1{font-family:var(--font-h);font-size:clamp(4rem,9vw,7.5rem);line-height:.9;letter-spacing:3px;text-transform:uppercase;margin-bottom:32px}
.tt-hero h1 .ln{display:block;overflow:hidden}
.tt-hero h1 .ln span{display:block;transform:translateY(105%);animation:tt-rev 1s var(--ease-smooth) forwards}
.tt-hero h1 .ln:nth-child(1) span{animation-delay:.6s}
.tt-hero h1 .ln:nth-child(2) span{animation-delay:.8s}
.tt-hero h1 .ln:nth-child(3) span{animation-delay:1s}
.tt-hero h1 .accent{color:var(--accent);-webkit-text-stroke:0}
.tt-hero h1 .outline{color:transparent;-webkit-text-stroke:2px var(--text)}
.tt-hero-sub{font-family:var(--font-s);font-weight:300;font-size:clamp(1rem,1.5vw,1.2rem);color:var(--text-dim);max-width:400px;line-height:2;margin-bottom:44px;opacity:0;animation:tt-up .8s var(--ease-smooth) 1.3s forwards}
.tt-hero-ctas{display:flex;gap:16px;flex-wrap:wrap;opacity:0;animation:tt-up .8s var(--ease-smooth) 1.6s forwards}
.tt-btn{background:var(--accent);color:#fff;padding:18px 48px;font-family:var(--font-h);font-size:.95rem;letter-spacing:5px;border:none;cursor:pointer;transition:all .5s var(--ease-out);position:relative;overflow:hidden;display:inline-flex;align-items:center;gap:8px}
.tt-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);transition:left .5s}
.tt-btn:hover::before{left:100%}
.tt-btn:hover{background:var(--accent2);transform:translateY(-3px);box-shadow:0 12px 40px var(--accent-glow);color:#fff}
.tt-btn-o{border:2px solid var(--border);color:var(--text-mid);padding:18px 48px;font-family:var(--font-h);font-size:.95rem;letter-spacing:5px;background:transparent;cursor:pointer;transition:all .5s var(--ease-out);display:inline-flex;align-items:center;gap:8px}
.tt-btn-o:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-3px)}
.tt-hero-right{position:relative;overflow:hidden}
.tt-hero-right img{width:100%;height:100%;object-fit:cover;min-height:100vh;filter:contrast(1.1) saturate(.9)}
.tt-hero-right::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--bg) 0%,transparent 30%);z-index:1}
.tt-hero-right::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 60%,rgba(8,8,8,.4));z-index:1}
.tt-hero-badge{position:absolute;bottom:60px;right:40px;z-index:3;background:rgba(8,8,8,.8);backdrop-filter:blur(20px);padding:20px 28px;border:1px solid rgba(196,18,48,.2);display:flex;align-items:center;gap:16px}
.tt-hero-badge-icon{width:48px;height:48px;border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:1.1rem}
.tt-hero-badge-text{font-size:.6rem;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;line-height:1.6}
.tt-hero-badge-text strong{color:var(--text);display:block;font-family:var(--font-h);font-size:.9rem;letter-spacing:3px}
.tt-hero-vertical{position:absolute;bottom:40px;left:40px;z-index:3;writing-mode:vertical-lr;font-family:var(--font-b);font-size:.55rem;letter-spacing:5px;text-transform:uppercase;color:var(--text-dim);display:flex;align-items:center;gap:12px;opacity:0;animation:tt-up .8s var(--ease-smooth) 2s forwards}
.tt-hero-vertical::after{content:'';width:2px;height:50px;background:linear-gradient(180deg,var(--accent),transparent)}

/* red line divider */
.tt-divider{height:3px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent),transparent);position:relative}

/* === LABEL === */
.tt-label{font-family:var(--font-b);font-weight:700;color:var(--accent);font-size:.6rem;margin-bottom:14px;letter-spacing:5px;text-transform:uppercase;display:flex;align-items:center;gap:14px}
.tt-label::before{content:'';width:40px;height:2px;background:var(--accent)}

/* === GALLERY === */
.tt-gallery{padding:140px 40px;background:var(--bg);position:relative;overflow:hidden}
.tt-gallery-inner{max-width:var(--max);margin:0 auto;position:relative;z-index:1}
.tt-gallery-header{text-align:center;margin-bottom:72px}
.tt-gallery-header h2{font-family:var(--font-h);font-size:clamp(2.4rem,5vw,3.6rem);letter-spacing:4px;text-transform:uppercase}
.tt-gallery-header h2 span{color:var(--accent)}
.tt-gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:280px;gap:6px}
.tt-gallery-item{position:relative;overflow:hidden;cursor:pointer}
.tt-gallery-item:nth-child(1){grid-column:span 2;grid-row:span 2}
.tt-gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .8s var(--ease-smooth),filter .5s;filter:saturate(.8)}
.tt-gallery-item:hover img{transform:scale(1.1);filter:saturate(1) brightness(.6)}
.tt-gallery-item::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(8,8,8,.85));opacity:0;transition:opacity .5s;pointer-events:none}
.tt-gallery-item:hover::after{opacity:1}
.tt-gallery-item-label{position:absolute;bottom:20px;left:20px;z-index:2;opacity:0;transform:translateY(14px);transition:all .5s var(--ease-out)}
.tt-gallery-item:hover .tt-gallery-item-label{opacity:1;transform:translateY(0)}
.tt-gallery-item-label h4{font-family:var(--font-h);font-size:.9rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.tt-gallery-item-label span{font-family:var(--font-s);font-size:.8rem;color:var(--accent)}

/* === STYLES === */
.tt-styles{padding:140px 40px;background:var(--bg2);position:relative;overflow:hidden}
.tt-styles-inner{max-width:var(--max);margin:0 auto;position:relative;z-index:1}
.tt-styles-header{text-align:center;margin-bottom:80px}
.tt-styles-header h2{font-family:var(--font-h);font-size:clamp(2.4rem,5vw,3.6rem);letter-spacing:4px;text-transform:uppercase}
.tt-styles-header h2 span{color:var(--accent)}
.tt-styles-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.tt-style-card{background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.04);transition:all .6s var(--ease-out);position:relative;overflow:hidden}
.tt-style-card::before{content:'';position:absolute;bottom:0;left:0;width:0;height:3px;background:var(--accent);transition:width .5s var(--ease-out);z-index:3}
.tt-style-card:hover{border-color:rgba(196,18,48,.15);transform:translateY(-6px)}
.tt-style-card:hover::before{width:100%}
.tt-style-card-img{height:240px;overflow:hidden;position:relative}
.tt-style-card-img img{width:100%;height:100%;object-fit:cover;filter:saturate(.6) brightness(.8);transition:all .7s var(--ease-smooth)}
.tt-style-card:hover .tt-style-card-img img{filter:saturate(1) brightness(.65);transform:scale(1.08)}
.tt-style-card-img::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(8,8,8,.9));pointer-events:none}
.tt-style-card-body{padding:32px 28px;position:relative}
.tt-style-num{font-family:var(--font-h);font-size:4.5rem;color:rgba(196,18,48,.05);line-height:.8;position:absolute;top:-24px;right:16px;letter-spacing:3px;pointer-events:none}
.tt-style-card h3{font-family:var(--font-h);font-size:1.15rem;letter-spacing:4px;margin-bottom:10px;text-transform:uppercase}
.tt-style-card p{font-family:var(--font-s);font-weight:300;color:var(--text-dim);font-size:.95rem;line-height:1.9}
.tt-style-tag{display:inline-block;margin-top:16px;font-family:var(--font-b);font-size:.55rem;letter-spacing:4px;color:var(--accent);padding:6px 14px;border:1px solid rgba(196,18,48,.2);text-transform:uppercase}

/* === ARTISTS === */
.tt-artists{padding:140px 40px;background:var(--bg);position:relative;overflow:hidden}
.tt-artists-inner{max-width:var(--max);margin:0 auto;position:relative;z-index:1}
.tt-artists-header{text-align:center;margin-bottom:80px}
.tt-artists-header h2{font-family:var(--font-h);font-size:clamp(2.4rem,5vw,3.6rem);letter-spacing:4px;text-transform:uppercase}
.tt-artists-header h2 span{color:var(--accent)}
.tt-artists-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:40px}
.tt-artist{text-align:center}
.tt-artist-img{width:220px;height:220px;margin:0 auto 28px;overflow:hidden;position:relative;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);transition:all .6s var(--ease-out)}
.tt-artist:hover .tt-artist-img{transform:scale(1.05)}
.tt-artist-img img{width:100%;height:100%;object-fit:cover;filter:saturate(.7);transition:filter .5s}
.tt-artist:hover .tt-artist-img img{filter:saturate(1)}
.tt-artist h4{font-family:var(--font-h);font-size:1.3rem;letter-spacing:5px;margin-bottom:6px;text-transform:uppercase}
.tt-artist-specialty{font-family:var(--font-s);font-weight:300;color:var(--accent);font-size:.95rem;letter-spacing:2px;margin-bottom:14px;font-style:italic}
.tt-artist p{font-family:var(--font-s);font-weight:300;color:var(--text-dim);font-size:.9rem;line-height:1.9;max-width:260px;margin:0 auto}
.tt-artist-social{display:flex;justify-content:center;gap:12px;margin-top:16px}
.tt-artist-social a{font-family:var(--font-b);font-size:.55rem;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);padding:6px 12px;border:1px solid rgba(255,255,255,.06);transition:all .3s}
.tt-artist-social a:hover{border-color:var(--accent);color:var(--accent)}

/* === PARALLAX === */
.tt-parallax{height:500px;position:relative;overflow:hidden}
.tt-parallax img{width:100%;height:140%;object-fit:cover;position:absolute;top:-20%;left:0;will-change:transform;filter:brightness(.25) contrast(1.2) saturate(.7)}
.tt-parallax-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.tt-parallax-stat{font-family:var(--font-h);font-size:clamp(3.5rem,10vw,7rem);color:#fff;letter-spacing:8px;line-height:1;text-transform:uppercase}
.tt-parallax-stat span{color:var(--accent)}
.tt-parallax-sub{font-family:var(--font-s);font-weight:300;color:rgba(255,255,255,.3);font-size:1.2rem;letter-spacing:4px;font-style:italic}

/* === PRICING === */
.tt-pricing{padding:160px 40px;background:linear-gradient(165deg,#060606 0%,#101010 40%,#0A0A0A 100%);position:relative;overflow:hidden}
.tt-pricing::before{content:'';position:absolute;top:-300px;right:-300px;width:900px;height:900px;background:radial-gradient(circle,rgba(196,18,48,.1),transparent 55%);pointer-events:none;animation:tt-glow 6s ease-in-out infinite alternate}
.tt-pricing::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent)}
.tt-pricing-inner{max-width:1100px;margin:0 auto;position:relative;z-index:1}
.tt-pricing-top{display:grid;grid-template-columns:1fr 1.1fr;gap:80px;align-items:center}
.tt-pricing-text h2{font-family:var(--font-h);font-size:clamp(2.8rem,5vw,4rem);letter-spacing:4px;line-height:.95;margin-bottom:24px;text-transform:uppercase}
.tt-pricing-text h2 em{font-style:normal;color:var(--accent);display:block}
.tt-pricing-text p{font-family:var(--font-s);font-weight:300;color:var(--text-dim);font-size:1.1rem;line-height:2}
.tt-pricing-trust{display:flex;gap:20px;margin-top:28px;flex-wrap:wrap}
.tt-pricing-trust span{font-family:var(--font-b);font-size:.55rem;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.tt-pricing-trust span::before{content:'';width:6px;height:6px;background:var(--accent);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%)}
.tt-pricing-cards{display:flex;flex-direction:column;gap:14px}
.tt-pcard{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);padding:28px 32px;cursor:pointer;transition:all .4s var(--ease-out);display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.tt-pcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:0;transition:opacity .4s}
.tt-pcard:hover{background:rgba(255,255,255,.03);border-color:rgba(196,18,48,.15);transform:translateX(6px)}
.tt-pcard:hover::before{opacity:1}
.tt-pcard.selected{border-color:var(--accent);background:rgba(196,18,48,.05);box-shadow:0 0 50px rgba(196,18,48,.06)}
.tt-pcard.selected::before{opacity:1}
.tt-pcard-left{display:flex;align-items:center;gap:18px}
.tt-pcard-radio{width:20px;height:20px;border:2px solid rgba(255,255,255,.08);clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);transition:all .3s var(--ease);flex-shrink:0;position:relative;background:transparent}
.tt-pcard.selected .tt-pcard-radio{border-color:var(--accent);background:var(--accent)}
.tt-pcard-info h4{font-family:var(--font-h);font-size:1rem;letter-spacing:4px;margin-bottom:4px;text-transform:uppercase}
.tt-pcard-info span{font-family:var(--font-s);font-size:.85rem;color:var(--text-dim)}
.tt-pcard-price{font-family:var(--font-h);font-size:1.8rem;color:var(--accent);letter-spacing:2px;text-shadow:0 0 30px rgba(196,18,48,.15)}

/* === REVIEWS === */
.tt-reviews{padding:140px 40px;background:var(--bg);position:relative;overflow:hidden}
.tt-reviews-inner{max-width:var(--max);margin:0 auto;position:relative;z-index:1}
.tt-reviews-header{text-align:center;margin-bottom:64px}
.tt-reviews-header h2{font-family:var(--font-h);font-size:clamp(2.4rem,5vw,3.6rem);letter-spacing:4px;text-transform:uppercase}
.tt-reviews-header h2 span{color:var(--accent)}
.tt-reviews-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.tt-review{background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.04);padding:44px 32px;transition:all .6s var(--ease-out);position:relative;overflow:hidden}
.tt-review::before{content:'';position:absolute;top:0;left:0;width:0;height:3px;background:var(--accent);transition:width .6s var(--ease-out)}
.tt-review:hover::before{width:100%}
.tt-review::after{content:'\201C';position:absolute;top:8px;right:20px;font-family:var(--font-s);font-size:7rem;color:rgba(196,18,48,.04);line-height:1;pointer-events:none}
.tt-review:nth-child(2){transform:translateY(32px)}

.tt-faq-item.open{border-color:rgba(196,18,48,.15)}

.tt-form select option{background:var(--bg2);color:var(--text)}
.tt-form textarea{grid-column:1/-1;resize:none;height:90px}
.tt-form .tt-btn{grid-column:1/-1;justify-content:center;padding:20px 48px;font-size:.95rem}

/* === FOOTER === */
.tt-footer{padding:56px 40px;background:var(--bg);border-top:1px solid rgba(255,255,255,.04)}

.tt-demo{position:fixed;bottom:0;left:0;width:100%;background:var(--accent);color:#fff;text-align:center;padding:10px 20px;font-family:var(--font-h);font-size:.75rem;letter-spacing:6px;z-index:9999;text-transform:uppercase}
