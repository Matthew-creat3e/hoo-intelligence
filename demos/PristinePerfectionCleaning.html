<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pristine Perfection Cleaning | Belton, MO — Cleaning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FBF7F6;--bg2:#F5EDED;--bg3:#EDE5E3;
  --dark:#1A141A;--dark2:#241C24;--dark3:#2E2430;
  --green:#C48B9F;--green-glow:rgba(196,139,159,.15);
  --coral:#9B8EC4;--coral-glow:rgba(155,142,196,.12);
  --gold:#C7A87C;
  --rose:#D4838F;--rose-soft:rgba(212,131,143,.08);
  --lavender:#B8A9D4;--lavender-soft:rgba(184,169,212,.08);
  --text:#2A2030;--text-mid:#6B5F6F;--text-dim:#A097A4;
  --white-dim:rgba(255,255,255,.5);
  --border:rgba(150,120,140,.08);
  --font-h:'Playfair Display',serif;
  --font-b:'Nunito',sans-serif;
  --font-m:'DM Mono',monospace;
  --max:1140px;
  --ease:cubic-bezier(.25,.46,.45,.94);
  --ease-out:cubic-bezier(.16,1,.3,1);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);line-height:1.7;overflow-x:hidden}
a{color:var(--green);text-decoration:none}
img{max-width:100%;display:block}

/* progress */
.progress{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--green),var(--coral),var(--rose));width:0;z-index:10001}

/* cursor */
.cur{position:fixed;width:20px;height:20px;border:1.5px solid var(--green);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .3s var(--ease-out),height .3s var(--ease-out),background .3s,border-color .3s}
.cur.h{width:50px;height:50px;background:rgba(196,139,159,.06);border-color:var(--coral)}
.cur-dot{position:fixed;width:4px;height:4px;background:var(--green);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%)}

/* decorative flourish */
.flourish{text-align:center;padding:8px 0;opacity:.3}
.flourish::before{content:'';display:inline-block;width:40px;height:1px;background:var(--green);vertical-align:middle}
.flourish::after{content:'';display:inline-block;width:40px;height:1px;background:var(--green);vertical-align:middle}
.flourish span{display:inline-block;margin:0 14px;font-size:.6rem;color:var(--green);transform:rotate(45deg)}

/* ornamental divider */
.orn{display:flex;align-items:center;justify-content:center;gap:12px;padding:40px 0}
.orn::before,.orn::after{content:'';width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent)}
.orn-dot{width:6px;height:6px;border:1px solid var(--green);transform:rotate(45deg)}

/* nav */
.nav{position:fixed;top:0;left:0;width:100%;z-index:999;padding:20px 0;background:transparent;transition:all .4s}
.nav.scrolled{background:rgba(251,247,246,.92);backdrop-filter:blur(20px);padding:14px 0;border-bottom:1px solid var(--border)}
.nav-in{max-width:var(--max);margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 32px}
.nav-logo{font-family:var(--font-h);font-size:.85rem;letter-spacing:3px;color:var(--dark)}
.nav-logo span{color:var(--green);font-style:italic}
.nav-links{display:flex;gap:28px;list-style:none;align-items:center}
.nav-links a{font-family:var(--font-m);font-size:.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:2px;transition:color .3s}
.nav-links a:hover{color:var(--green)}
.nav-cta{background:var(--green);color:#fff;padding:10px 24px;font-family:var(--font-m);font-size:.6rem;letter-spacing:3px;text-transform:uppercase;border:none;cursor:pointer;transition:all .3s;border-radius:2px}
.nav-cta:hover{background:var(--dark)}
.ham{display:none;border:none;background:none;cursor:pointer;flex-direction:column;gap:4px}
.ham span{width:18px;height:1.5px;background:var(--dark)}

/* === HERO — CINEMATIC SPLIT === */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;position:relative;overflow:hidden}
.hero-left{background:var(--dark);padding:clamp(100px,12vh,160px) clamp(32px,5vw,80px) 60px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
.hero-left::before{content:'PRISTINE';position:absolute;bottom:-20px;left:-10px;font-family:var(--font-h);font-size:clamp(6rem,14vw,12rem);font-weight:800;color:rgba(255,255,255,.02);line-height:1;pointer-events:none;font-style:italic}
.hero-tag{display:inline-flex;align-items:center;gap:8px;margin-bottom:28px;font-family:var(--font-m);font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--rose)}
.hero-tag::before{content:'';width:8px;height:8px;background:var(--rose);border-radius:50%;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.hero h1{font-family:var(--font-h);font-size:clamp(2.8rem,5vw,4.2rem);font-weight:700;color:#fff;line-height:1.1;margin-bottom:20px}
.hero h1 em{color:var(--rose);font-style:italic}
.hero-sub{font-size:.95rem;color:var(--white-dim);margin-bottom:36px;max-width:400px;line-height:1.9;font-family:var(--font-b)}
.hero-ctas{display:flex;gap:12px;margin-bottom:48px}
.btn{background:var(--green);color:#fff;padding:15px 36px;font-family:var(--font-m);font-size:.65rem;letter-spacing:3px;text-transform:uppercase;border:none;cursor:pointer;transition:all .4s var(--ease-out);text-decoration:none;display:inline-flex;align-items:center;gap:8px;position:relative;overflow:hidden;border-radius:2px}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .5s}
.btn:hover::before{left:100%}
.btn:hover{background:#a8758a;transform:translateY(-2px);box-shadow:0 8px 30px var(--green-glow);color:#fff}
.btn-w{background:transparent;color:#fff;padding:14px 36px;font-family:var(--font-m);font-size:.65rem;letter-spacing:3px;text-transform:uppercase;border:1px solid rgba(255,255,255,.12);cursor:pointer;transition:all .4s;text-decoration:none;border-radius:2px}
.btn-w:hover{border-color:var(--rose);color:var(--rose)}
.btn-dark{background:var(--dark);color:#fff}
.btn-dark:hover{background:var(--green);color:#fff}

/* hero checklist */
.hero-checks{display:flex;flex-direction:column;gap:6px}
.hc{display:flex;align-items:center;gap:10px;font-family:var(--font-m);font-size:.65rem;color:rgba(255,255,255,.35);letter-spacing:1px;transition:color .6s}
.hc.on{color:rgba(255,255,255,.7)}
.hc-box{width:16px;height:16px;border:1.5px solid rgba(255,255,255,.12);border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .5s}
.hc.on .hc-box{border-color:var(--rose);background:var(--rose)}
.hc.on .hc-box::after{content:'✓';color:#fff;font-size:.5rem}

/* hero right — image */
.hero-right{position:relative;overflow:hidden}
.hero-right img{width:100%;height:100%;object-fit:cover;filter:saturate(.85) brightness(1.02);transition:transform 8s ease}
.hero:hover .hero-right img{transform:scale(1.04)}
.hero-score{position:absolute;bottom:40px;left:40px;background:rgba(26,20,26,.8);backdrop-filter:blur(16px);padding:20px 28px;display:flex;align-items:center;gap:16px;border-left:3px solid var(--rose);border-radius:2px}
.hero-score-num{font-family:var(--font-h);font-size:2.4rem;font-weight:700;color:#fff;line-height:1}
.hero-score-text{font-family:var(--font-m);font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--white-dim);line-height:1.6}
.hero-score-text strong{color:var(--rose);display:block}

/* === TRUST STRIP === */
.trust{padding:20px 32px;background:var(--bg2);border-bottom:1px solid var(--border)}
.trust-in{max-width:var(--max);margin:0 auto;display:flex;justify-content:center;gap:clamp(20px,4vw,50px);flex-wrap:wrap}
.trust-item{font-family:var(--font-m);font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);display:flex;align-items:center;gap:8px}
.trust-item span{color:var(--green);font-size:.85rem}

/* === STATS === */
.stats{padding:48px 32px;background:linear-gradient(135deg,var(--dark) 0%,var(--dark2) 100%);position:relative}
.stats::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(196,139,159,.06),transparent 60%);pointer-events:none}
.stats-in{max-width:var(--max);margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:20px;text-align:center;position:relative;z-index:1}
.st-num{font-family:var(--font-h);font-size:2.4rem;font-weight:700;color:#fff}
.st-label{font-family:var(--font-m);font-size:.55rem;letter-spacing:3px;text-transform:uppercase;color:var(--white-dim);margin-top:4px}
.st-sep{width:1px;height:40px;background:rgba(255,255,255,.06);margin:0 auto}

/* === SECTIONS === */
.sec{padding:90px 32px;max-width:var(--max);margin:0 auto}
.sec-tag{font-family:var(--font-m);font-size:.55rem;letter-spacing:5px;text-transform:uppercase;color:var(--green);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.sec-tag::before{content:'';width:4px;height:4px;background:var(--green);border-radius:50%}
.sec-title{font-family:var(--font-h);font-size:clamp(1.8rem,3.5vw,2.6rem);font-weight:700;color:var(--dark);margin-bottom:12px;line-height:1.15}
.sec-title em{font-style:italic;color:var(--green)}
.sec-desc{color:var(--text-mid);max-width:480px;margin-bottom:44px;font-size:.92rem}

/* === PROMISE STRIP (new feminine element) === */
.promise{padding:60px 32px;background:var(--bg2);text-align:center;position:relative;overflow:hidden}
.promise::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent)}
.promise-in{max-width:800px;margin:0 auto}
.promise h3{font-family:var(--font-h);font-size:1.6rem;font-weight:600;color:var(--dark);font-style:italic;margin-bottom:12px}
.promise p{font-size:.88rem;color:var(--text-mid);max-width:520px;margin:0 auto 28px;line-height:1.9}
.promise-icons{display:flex;justify-content:center;gap:40px;flex-wrap:wrap}
.promise-icon{display:flex;flex-direction:column;align-items:center;gap:10px}
.promise-icon-circle{width:56px;height:56px;border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;background:#fff;transition:all .4s}
.promise-icon:hover .promise-icon-circle{border-color:var(--green);background:var(--rose-soft);transform:translateY(-3px)}
.promise-icon span{font-family:var(--font-m);font-size:.5rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)}

/* === ROOM CARDS — PREMIUM === */
.room-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.room{border:1px solid var(--border);overflow:hidden;background:#fff;transition:all .5s var(--ease-out);position:relative;border-radius:3px}
.room:hover{transform:translateY(-6px);box-shadow:0 20px 60px rgba(150,120,140,.1);border-color:rgba(196,139,159,.2)}
.room-img{position:relative;overflow:hidden;aspect-ratio:4/3}
.room-img img{width:100%;height:100%;object-fit:cover;transition:transform .8s var(--ease-out);filter:brightness(.95) saturate(.85)}
.room:hover .room-img img{transform:scale(1.06);filter:brightness(1) saturate(1)}
.room-badge{position:absolute;top:12px;right:12px;background:var(--green);color:#fff;padding:4px 10px;font-family:var(--font-m);font-size:.5rem;letter-spacing:2px;text-transform:uppercase;border-radius:2px}
.room-body{padding:24px}
.room-name{font-family:var(--font-h);font-size:1.15rem;font-weight:600;margin-bottom:6px}
.room-desc{font-size:.78rem;color:var(--text-mid);margin-bottom:18px;line-height:1.6}
.room-bar{height:3px;background:var(--bg2);position:relative;overflow:hidden;border-radius:2px}
.room-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--rose));width:0;transition:width 1.8s var(--ease-out);border-radius:2px}
.room-bar-meta{display:flex;justify-content:space-between;margin-top:8px;font-family:var(--font-m);font-size:.5rem;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase}

/* === 40-POINT CHECKLIST === */
.cl-sec{background:linear-gradient(135deg,var(--dark) 0%,var(--dark2) 50%,var(--dark3) 100%);padding:90px 32px;position:relative;overflow:hidden}
.cl-sec::before{content:'INSPECTION';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--font-h);font-size:clamp(5rem,14vw,12rem);font-weight:800;color:rgba(255,255,255,.015);white-space:nowrap;pointer-events:none;font-style:italic}
.cl-sec::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 30%,rgba(196,139,159,.04),transparent 50%);pointer-events:none}
.cl-in{max-width:var(--max);margin:0 auto;position:relative;z-index:1}
.cl-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;margin-top:44px}
.cl-col h3{font-family:var(--font-h);font-size:.8rem;letter-spacing:3px;text-transform:uppercase;color:var(--rose);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.06);font-style:italic}
.cli{display:flex;align-items:flex-start;gap:14px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03);transition:all .4s}
.cli:hover{padding-left:6px}
.cli-box{width:18px;height:18px;border:1.5px solid rgba(255,255,255,.1);border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .5s}
.cli.on .cli-box{border-color:var(--rose);background:var(--rose)}
.cli.on .cli-box::after{content:'✓';color:#fff;font-size:.55rem}
.cli-text{font-size:.82rem;color:rgba(255,255,255,.35);line-height:1.5;transition:color .5s}
.cli.on .cli-text{color:rgba(255,255,255,.75)}

/* === CLEAN SCORE GAUGE === */
.score-sec{padding:90px 32px;text-align:center;background:var(--bg2);position:relative}
.score-sec::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:200px;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent)}
.score-in{max-width:var(--max);margin:0 auto}
.score-gauge{width:220px;height:220px;margin:44px auto;position:relative;display:flex;align-items:center;justify-content:center}
.score-ring{position:absolute;inset:0}
.score-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.score-ring circle{fill:none;stroke-width:4;cx:110;cy:110;r:100}
.ring-bg{stroke:var(--bg)}
.ring-fill{stroke:url(#ringGrad);stroke-dasharray:628;stroke-dashoffset:628;stroke-linecap:round;transition:stroke-dashoffset 2.5s var(--ease-out)}
.ring-fill.go{stroke-dashoffset:31}
.score-val{font-family:var(--font-h);font-size:3.8rem;font-weight:700;color:var(--dark);line-height:1}
.score-lbl{font-family:var(--font-m);font-size:.55rem;letter-spacing:4px;text-transform:uppercase;color:var(--green);margin-top:4px}
.score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:44px;max-width:700px;margin-left:auto;margin-right:auto}
.sc-item{padding:24px 16px;border:1px solid var(--border);background:#fff;transition:all .4s;border-radius:3px}
.sc-item:hover{border-color:rgba(196,139,159,.2);transform:translateY(-3px);box-shadow:0 12px 40px rgba(150,120,140,.08)}
.sc-val{font-family:var(--font-h);font-size:1.5rem;font-weight:700;color:var(--green)}
.sc-name{font-family:var(--font-m);font-size:.5rem;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-top:4px}

/* === PRICING === */
.price-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:44px}
.pc{border:1px solid var(--border);padding:40px 28px;background:#fff;position:relative;transition:all .5s var(--ease-out);border-radius:3px}
.pc:hover{transform:translateY(-6px);box-shadow:0 20px 60px rgba(150,120,140,.08)}
.pc.feat{border-color:var(--green);background:var(--dark);color:#fff;border-radius:3px}
.pc.feat::before{content:'MOST POPULAR';position:absolute;top:0;left:0;right:0;background:linear-gradient(90deg,var(--green),var(--rose));color:#fff;text-align:center;font-family:var(--font-m);font-size:.5rem;letter-spacing:3px;padding:6px;border-radius:3px 3px 0 0}
.pc-name{font-family:var(--font-h);font-size:1.3rem;font-weight:600;margin-bottom:4px;font-style:italic}
.pc.feat .pc-name{margin-top:22px}
.pc-sub{font-family:var(--font-m);font-size:.55rem;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:24px}
.pc.feat .pc-sub{color:var(--white-dim)}
.pc-price{font-family:var(--font-h);font-size:3rem;font-weight:700;color:var(--green);line-height:1;margin-bottom:4px}
.pc-per{font-family:var(--font-m);font-size:.55rem;color:var(--text-dim);letter-spacing:1px;margin-bottom:28px}
.pc.feat .pc-per{color:var(--white-dim)}
.pc-list{list-style:none;margin-bottom:28px}
.pc-list li{display:flex;align-items:center;gap:10px;padding:9px 0;font-size:.8rem;color:var(--text-mid);border-bottom:1px solid var(--border)}
.pc.feat .pc-list li{color:rgba(255,255,255,.5);border-color:rgba(255,255,255,.06)}
.pc-list li::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.pc.feat .pc-list li::before{background:var(--rose)}
.pc .btn,.pc .btn-dark{width:100%;justify-content:center}

/* === BEFORE/AFTER === */
.ba-sec{padding:90px 32px;background:linear-gradient(135deg,var(--dark) 0%,var(--dark2) 100%);position:relative}
.ba-sec::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 80%,rgba(212,131,143,.04),transparent 50%);pointer-events:none}
.ba-in{max-width:var(--max);margin:0 auto;position:relative;z-index:1}
.ba-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:44px}
.ba{position:relative;overflow:hidden;aspect-ratio:4/3;border-radius:2px}
.ba img{width:100%;height:100%;object-fit:cover;filter:saturate(.85);transition:all .6s}
.ba:hover img{filter:saturate(1);transform:scale(1.03)}
.ba-tag{position:absolute;top:12px;left:12px;padding:5px 12px;font-family:var(--font-m);font-size:.5rem;letter-spacing:2px;text-transform:uppercase;backdrop-filter:blur(8px);border-radius:2px}
.ba-tag.bef{background:rgba(212,131,143,.85);color:#fff}
.ba-tag.aft{background:rgba(196,139,159,.85);color:#fff}
.ba-cap{position:absolute;bottom:0;left:0;right:0;padding:16px 16px;background:linear-gradient(transparent,rgba(0,0,0,.5));font-family:var(--font-m);font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.6)}

/* === REVIEWS === */
.rev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:44px}
.rev{background:#fff;border:1px solid var(--border);padding:32px;position:relative;transition:all .5s var(--ease-out);overflow:hidden;border-radius:3px}
.rev::before{content:'';position:absolute;top:0;left:0;width:0;height:3px;background:linear-gradient(90deg,var(--green),var(--rose),var(--coral));transition:width .5s;border-radius:2px}
.rev:hover::before{width:100%}
.rev:hover{transform:translateY(-4px);box-shadow:0 16px 50px rgba(150,120,140,.08)}
.rev-stars{color:var(--rose);font-size:.75rem;letter-spacing:2px;margin-bottom:16px}
.rev-text{font-family:var(--font-h);font-size:.88rem;color:var(--text-mid);line-height:1.85;margin-bottom:20px;font-style:italic}
.rev-meta{display:flex;align-items:center;gap:12px}
.rev-av{width:38px;height:38px;background:linear-gradient(135deg,var(--green),var(--rose));color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-m);font-size:.65rem;font-weight:500;letter-spacing:1px}
.rev-name{font-family:var(--font-m);font-size:.6rem;letter-spacing:1px;color:var(--dark);font-weight:500}
.rev-loc{font-family:var(--font-m);font-size:.55rem;color:var(--text-dim);margin-top:2px}

/* === CTA === */
.cta{padding:100px 32px;background:linear-gradient(135deg,var(--dark) 0%,var(--dark2) 50%,var(--dark3) 100%);text-align:center;position:relative;overflow:hidden}
.cta::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(196,139,159,.08),transparent 60%)}
.cta::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 80%,rgba(155,142,196,.06),transparent 50%)}
.cta-in{max-width:540px;margin:0 auto;position:relative;z-index:1}
.cta h2{font-family:var(--font-h);font-size:clamp(2rem,4vw,3rem);font-weight:700;color:#fff;margin-bottom:16px;line-height:1.15}
.cta h2 em{color:var(--rose);font-style:italic}
.cta p{color:var(--white-dim);margin-bottom:32px;font-size:.92rem}
.cta-form{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cta-form input{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:#fff;padding:14px 18px;font-family:var(--font-b);font-size:.8rem;outline:none;transition:border-color .3s;border-radius:2px}
.cta-form input::placeholder{color:rgba(255,255,255,.2)}
.cta-form input:focus{border-color:var(--rose)}
.cta-form .btn{grid-column:1/-1;justify-content:center;background:linear-gradient(90deg,var(--green),var(--rose))}
.cta-form .btn:hover{background:linear-gradient(90deg,var(--rose),var(--coral))}
.cta-phone{margin-top:24px;font-family:var(--font-m);font-size:.6rem;letter-spacing:2px;color:rgba(255,255,255,.2)}
.cta-phone a{color:rgba(255,255,255,.5);font-size:1rem;letter-spacing:3px;transition:color .3s}
.cta-phone a:hover{color:var(--rose)}

/* footer */
.footer{padding:32px;border-top:1px solid var(--border)}
.footer-in{max-width:var(--max);margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.footer p{font-family:var(--font-m);font-size:.55rem;color:var(--text-dim);letter-spacing:1px}

/* sticky */
.sticky{display:none;position:fixed;bottom:0;left:0;right:0;z-index:99;background:var(--dark);border-top:2px solid var(--green);padding:10px 16px;gap:8px}
.sticky a{flex:1;text-align:center;padding:13px;font-family:var(--font-m);font-size:.6rem;letter-spacing:2px;text-transform:uppercase;text-decoration:none;border-radius:2px}
.sticky .s1{background:linear-gradient(90deg,var(--green),var(--rose));color:#fff}
.sticky .s2{color:#fff;border:1px solid rgba(255,255,255,.1)}

/* reveal */
.rv{opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s ease}
.rv.vis{opacity:1;transform:none}

/* grain */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9990;opacity:.015;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* sparkle float animation */
@keyframes sparkle{0%{opacity:0;transform:translateY(0) scale(0)}50%{opacity:1;transform:translateY(-20px) scale(1)}100%{opacity:0;transform:translateY(-40px) scale(0)}}
.sparkles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.sparkles i{position:absolute;width:4px;height:4px;background:var(--rose);border-radius:50%;animation:sparkle 3s ease infinite}
.sparkles i:nth-child(1){left:15%;top:80%;animation-delay:0s}
.sparkles i:nth-child(2){left:45%;top:70%;animation-delay:.8s;width:3px;height:3px;background:var(--coral)}
.sparkles i:nth-child(3){left:75%;top:85%;animation-delay:1.6s;width:5px;height:5px;background:var(--green)}
.sparkles i:nth-child(4){left:30%;top:60%;animation-delay:2.4s;width:3px;height:3px;background:var(--lavender)}
.sparkles i:nth-child(5){left:60%;top:75%;animation-delay:.4s;background:var(--gold)}
.sparkles i:nth-child(6){left:85%;top:65%;animation-delay:1.2s;width:3px;height:3px;background:var(--rose)}

@media(max-width:768px){
  .cur,.cur-dot{display:none}
  .nav-links{display:none}.ham{display:flex}
  .hero{grid-template-columns:1fr;min-height:auto}
  .hero-right{min-height:350px}
  .hero-score{left:16px;bottom:16px}
  .stats-in,.score-grid{grid-template-columns:repeat(2,1fr)}
  .room-grid,.price-cards,.rev-grid{grid-template-columns:1fr}
  .cl-grid{grid-template-columns:1fr;gap:30px}
  .ba-grid{grid-template-columns:1fr}
  .cta-form{grid-template-columns:1fr}
  .footer-in{flex-direction:column;gap:8px;text-align:center}
  .sticky{display:flex}
  .trust-in{gap:16px}
  .promise-icons{gap:24px}
}
</style>
</head>
