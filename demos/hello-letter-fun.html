<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hi There! 🌈</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
  overflow: hidden;
  gap: 40px;
}

.message {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 20px;
}

.letter {
  font-size: 120px;
  font-weight: 900;
  display: inline-block;
  cursor: pointer;
  transition: transform 0.2s;
  text-shadow: 4px 4px 8px rgba(0,0,0,0.3);
  user-select: none;
}

.letter:hover {
  transform: scale(1.4) rotate(10deg) !important;
}

/* Each letter gets its own color and animation */
.letter:nth-child(1)  { color: #FF6B6B; animation: bounce 1s ease infinite 0s; }
.letter:nth-child(2)  { color: #4ECDC4; animation: bounce 1s ease infinite 0.1s; }
.letter:nth-child(3)  { color: #FFE66D; animation: bounce 1s ease infinite 0.2s; }
.letter:nth-child(4)  { color: #FF8A5C; animation: bounce 1s ease infinite 0.3s; }
.letter:nth-child(5)  { color: #A8E6CF; animation: bounce 1s ease infinite 0.4s; }
.letter:nth-child(6)  { color: #FF6B6B; animation: bounce 1s ease infinite 0.5s; }
.letter:nth-child(7)  { color: #DDA0DD; animation: bounce 1s ease infinite 0.6s; }
.letter:nth-child(8)  { color: #87CEEB; animation: bounce 1s ease infinite 0.7s; }
.letter:nth-child(9)  { color: #FFD700; animation: bounce 1s ease infinite 0.8s; }
.letter:nth-child(10) { color: #98FB98; animation: bounce 1s ease infinite 0.9s; }
.letter:nth-child(11) { color: #FF69B4; animation: bounce 1s ease infinite 1.0s; }
.letter:nth-child(12) { color: #00CED1; animation: bounce 1s ease infinite 1.1s; }

.space { width: 40px; }

@keyframes bounce {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-30px) rotate(-5deg); }
  50% { transform: translateY(0) rotate(0deg); }
  75% { transform: translateY(-15px) rotate(5deg); }
}

/* Sparkles */
.sparkle {
  position: fixed;
  pointer-events: none;
  font-size: 30px;
  animation: sparkle-fall 3s ease-in forwards;
  z-index: 100;
}

@keyframes sparkle-fall {
  0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translateY(300px) rotate(720deg) scale(0); }
}

/* Click burst */
.burst {
  position: fixed;
  pointer-events: none;
  font-size: 50px;
  animation: burst 0.6s ease-out forwards;
  z-index: 200;
}

@keyframes burst {
  0% { opacity: 1; transform: scale(0.5); }
  100% { opacity: 0; transform: scale(2); }
}

.subtitle {
  color: white;
  font-size: 28px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  animation: fadeIn 2s ease;
  text-align: center;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.alphabet-btn {
  background: rgba(255,255,255,0.2);
  border: 3px solid white;
  border-radius: 20px;
  padding: 15px 30px;
  color: white;
  font-size: 24px;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.3s;
  backdrop-filter: blur(10px);
}

.alphabet-btn:hover {
  background: rgba(255,255,255,0.4);
  transform: scale(1.1);
}

/* Alphabet parade */
.alphabet-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  padding: 10px 20px;
  max-width: 900px;
}

.abc-letter {
  width: 70px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  font-weight: 900;
  border-radius: 15px;
  cursor: pointer;
  transition: all 0.3s;
  animation: popIn 0.5s ease backwards;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
}

.abc-letter:hover {
  transform: scale(1.3) rotate(10deg);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0) rotate(-180deg); }
  to { opacity: 1; transform: scale(1) rotate(0deg); }
}
</style>
</head>
<body>

<div class="message" id="greeting">
  <span class="letter">H</span>
  <span class="letter">I</span>
  <span class="space"></span>
  <span class="letter">T</span>
  <span class="letter">H</span>
  <span class="letter">E</span>
  <span class="letter">R</span>
  <span class="letter">E</span>
  <span class="letter">!</span>
</div>

<p class="subtitle">Click the letters! 🎉 Tap the button to see the alphabet!</p>

<button class="alphabet-btn" id="abcBtn">🔤 Show Me The Alphabet!</button>

<div class="alphabet-row" id="abcRow"></div>

<script>
const colors = [
  '#FF6B6B','#4ECDC4','#FFE66D','#FF8A5C','#A8E6CF',
  '#DDA0DD','#87CEEB','#FFD700','#98FB98','#FF69B4',
  '#00CED1','#FFA07A','#9370DB','#20B2AA','#F08080',
  '#7B68EE','#3CB371','#FF7F50','#6495ED','#DC143C',
  '#00FA9A','#FF1493','#1E90FF','#FFD700','#32CD32','#FF4500'
];

const emojis = ['⭐','🌟','✨','💖','🦋','🌈','🎀','🌸','🎉','💫','🍭','🦄'];

// Click letters for fun burst
document.querySelectorAll('.letter').forEach(el => {
  el.addEventListener('click', (e) => {
    // Say the letter
    if ('speechSynthesis' in window) {
      const msg = new SpeechSynthesisUtterance(el.textContent === '!' ? 'Yay!' : el.textContent);
      msg.rate = 0.8;
      msg.pitch = 1.3;
      speechSynthesis.speak(msg);
    }

    // Burst emoji
    for (let i = 0; i < 5; i++) {
      const burst = document.createElement('div');
      burst.className = 'burst';
      burst.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      burst.style.left = (e.clientX - 25 + (Math.random() - 0.5) * 100) + 'px';
      burst.style.top = (e.clientY - 25 + (Math.random() - 0.5) * 100) + 'px';
      document.body.appendChild(burst);
      setTimeout(() => burst.remove(), 600);
    }
  });
});

// Alphabet button
let abcVisible = false;
document.getElementById('abcBtn').addEventListener('click', () => {
  const row = document.getElementById('abcRow');
  if (abcVisible) {
    row.innerHTML = '';
    abcVisible = false;
    document.getElementById('abcBtn').textContent = '🔤 Show Me The Alphabet!';
    return;
  }
  abcVisible = true;
  document.getElementById('abcBtn').textContent = '🙈 Hide The Alphabet';

  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach((char, i) => {
    const div = document.createElement('div');
    div.className = 'abc-letter';
    div.textContent = char;
    div.style.background = colors[i];
    div.style.animationDelay = (i * 0.05) + 's';
    div.style.color = 'white';

    div.addEventListener('click', (e) => {
      // Say the letter
      if ('speechSynthesis' in window) {
        const msg = new SpeechSynthesisUtterance(char);
        msg.rate = 0.8;
        msg.pitch = 1.3;
        speechSynthesis.speak(msg);
      }
      // Sparkle
      for (let j = 0; j < 3; j++) {
        const sp = document.createElement('div');
        sp.className = 'burst';
        sp.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        sp.style.left = (e.clientX - 25 + (Math.random()-0.5)*80) + 'px';
        sp.style.top = (e.clientY - 25 + (Math.random()-0.5)*80) + 'px';
        document.body.appendChild(sp);
        setTimeout(() => sp.remove(), 600);
      }
    });

    row.appendChild(div);
  });
});

// Background sparkles
setInterval(() => {
  const sp = document.createElement('div');
  sp.className = 'sparkle';
  sp.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  sp.style.left = Math.random() * window.innerWidth + 'px';
  sp.style.top = '-30px';
  document.body.appendChild(sp);
  setTimeout(() => sp.remove(), 3000);
}, 500);
</script>

</body>
</html>
