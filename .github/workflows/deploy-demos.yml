name: Deploy Demos to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'outputs/demos/**'
      - 'demos/**'
      - 'docs/**'
      - '.github/workflows/deploy-demos.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build pages directory
        run: |
          mkdir -p _site/demos
          # Copy all demo HTML files — both LEAD-xxx and clean-named versions
          cp outputs/demos/LEAD-*.html _site/demos/ 2>/dev/null || true
          cp outputs/demos/v4-*.html _site/demos/ 2>/dev/null || true
          # Copy clean-named demos (customer-facing URLs like GentrysMobileCarDetailingLlc.html)
          for f in demos/*.html; do
            cp "$f" _site/demos/ 2>/dev/null || true
          done
          # Copy asset folders demos reference (vehicle silhouettes, mascots, brand logos, etc.)
          if [ -d demos/assets ]; then
            mkdir -p _site/demos/assets
            cp -r demos/assets/* _site/demos/assets/ 2>/dev/null || true
            echo "Copied $(find _site/demos/assets -type f | wc -l) asset files"
          fi
          # Copy docs index if exists
          cp docs/index.html _site/index.html 2>/dev/null || true
          # Generate demos index
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>HOO Demos</title>' > _site/demos/index.html
          echo '<style>body{background:#050505;color:#F0EAE0;font-family:Syne,sans-serif;padding:40px}' >> _site/demos/index.html
          echo 'a{color:#C8952E;text-decoration:none}a:hover{color:#E8B84B}h1{font-family:"Bebas Neue",sans-serif;color:#C8952E;letter-spacing:3px}' >> _site/demos/index.html
          echo '.card{border:1px solid rgba(200,149,46,.2);padding:16px;margin:8px 0;transition:border-color .3s}.card:hover{border-color:#C8952E}</style></head>' >> _site/demos/index.html
          echo '<body><h1>HOO DEMOS</h1><p style="color:rgba(240,234,224,.6)">Built by HOO — herrmanonlineoutlook.com</p><hr style="border-color:rgba(200,149,46,.2);margin:20px 0">' >> _site/demos/index.html
          for f in _site/demos/*.html; do
            [ "$(basename "$f")" = "index.html" ] && continue
            name=$(basename "$f" .html)
            echo "<div class='card'><a href='${name}.html'>${name}</a></div>" >> _site/demos/index.html
          done
          echo '</body></html>' >> _site/demos/index.html

      - name: Inject Mapbox token
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          if [ -z "$MAPBOX_TOKEN" ]; then
            echo "::warning::MAPBOX_TOKEN secret not set — map widgets will be inert. Add it at repo Settings → Secrets and variables → Actions."
          else
            count=$(grep -rl '__MAPBOX_TOKEN__' _site/demos/ 2>/dev/null | wc -l)
            find _site/demos -name "*.html" -exec sed -i "s|__MAPBOX_TOKEN__|$MAPBOX_TOKEN|g" {} +
            echo "✅ Mapbox token injected into $count demo files"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
