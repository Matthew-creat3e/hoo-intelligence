name: Deploy Demos to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'outputs/demos/**'
      - 'docs/**'
      - '.github/workflows/deploy-demos.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build pages directory
        run: |
          mkdir -p _site/demos
          # Copy all demo HTML files
          cp outputs/demos/LEAD-*.html _site/demos/ 2>/dev/null || true
          # Copy docs index if exists
          cp docs/index.html _site/index.html 2>/dev/null || true
          # Generate demos index
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>HOO Demos</title>' > _site/demos/index.html
          echo '<style>body{background:#050505;color:#F0EAE0;font-family:Syne,sans-serif;padding:40px}' >> _site/demos/index.html
          echo 'a{color:#C8952E;text-decoration:none}a:hover{color:#E8B84B}h1{font-family:"Bebas Neue",sans-serif;color:#C8952E;letter-spacing:3px}' >> _site/demos/index.html
          echo '.card{border:1px solid rgba(200,149,46,.2);padding:16px;margin:8px 0;transition:border-color .3s}.card:hover{border-color:#C8952E}</style></head>' >> _site/demos/index.html
          echo '<body><h1>HOO DEMOS</h1><p style="color:rgba(240,234,224,.6)">Built by HOO — herrmanonlineoutlook.com</p><hr style="border-color:rgba(200,149,46,.2);margin:20px 0">' >> _site/demos/index.html
          for f in _site/demos/LEAD-*.html; do
            name=$(basename "$f" .html)
            echo "<div class='card'><a href='${name}.html'>${name}</a></div>" >> _site/demos/index.html
          done
          echo '</body></html>' >> _site/demos/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
